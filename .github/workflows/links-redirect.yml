name: Links - Redirect

# This workflow can be triggered manually
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  generate_report:
    runs-on: ubuntu-latest
    name: Generate Redirect Links PR

    steps:
      - uses: actions/checkout@v6

      - name: Download Latest Artifact
        uses: dawidd6/action-download-artifact@v18
        with:
          name: link-checker-results
          workflow: main.yml
          branch: main
          path: ./artifacts
          github_token: ${{ secrets.CREATE_PULLREQUEST_ACCESS_TOKEN }}
          check_artifacts: true
          search_artifacts: true
          if_no_artifact_found: fail

      - name: Build Replacements from redirect_map
        id: build_replacements
        run: |
          $json = Get-Content -Path ./artifacts/output.json | ConvertFrom-Json

          $hasRedirectMap = $null -ne $json.redirect_map -and $json.redirect_map.PSObject.Properties.Count -gt 0

          $replacements = [ordered]@{}

          foreach ($page in $json.redirect_map.PSObject.Properties) {
              foreach ($entry in $page.Value) {
                  $originalUrl = $entry.url
                  $redirects = $entry.status.redirects.redirects

                  if ($redirects -and $redirects.Count -gt 0) {
                      $finalUrl = $redirects[-1].url

                      # Skip replacements for learn.microsoft.com links that only differ by the presence of "en-us" in the path, as these are intentional
                      $isLearnWithoutEnUs = $originalUrl -match '^https://learn\.microsoft\.com/(?!en-us(?:/|$))'
                      $isLearnWithEnUs = $finalUrl -match '^https://learn\.microsoft\.com/en-us(?:/|$)'
                      if ($isLearnWithoutEnUs -and $isLearnWithEnUs) {
                        continue
                      }

                      if ($originalUrl -ne $finalUrl) {
                          $replacements[$originalUrl] = $finalUrl
                      }
                  }
              }
          }

          $replacementPairs = @(
              foreach ($key in $replacements.Keys) {
                  [PSCustomObject]@{
                      find = $key
                      replace = $replacements[$key]
                  }
              }
          )

          $replacementsJson = $replacementPairs | ConvertTo-Json -Depth 3 -Compress
          $replacementsJson | Set-Content -Path ./artifacts/replacements.json

          Write-Host "Found $($replacementPairs.Count) URL replacements"

          "replacements=$replacementsJson" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "should_continue=$hasRedirectMap" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh

      - uses: actions/upload-artifact@v7
        if: ${{ steps.build_replacements.outputs.should_continue == 'True' }}
        with:
          name: redirect-replacements
          path: ./artifacts/replacements.json
          retention-days: 7

      - name: Replacements
        if: ${{ steps.build_replacements.outputs.should_continue == 'True' }}
        uses: flcdrg/replace-multiple-action@v4
        with:
          files: "src/posts/**/*.md"
          findJsonFile: ./artifacts/replacements.json
          prefix: '(^|\s+|\()'
          suffix: '($|\s+|\))'

      - name: Create Pull Request
        if: ${{ steps.build_replacements.outputs.should_continue == 'True' }}
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          title: "Fix redirect links"
          token: ${{ secrets.CREATE_PULLREQUEST_ACCESS_TOKEN }}
          add-paths: "src/posts/**/*.md"
          base: main
